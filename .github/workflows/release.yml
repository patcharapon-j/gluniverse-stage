name: Release Module

# Manually triggered from the Actions tab. GitHub renders the "Release type"
# input as a dropdown (patch / minor / major) so you pick how the version bumps.
on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type (which part of the version to bump)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute new version
        id: version
        run: |
          CURRENT=$(jq -r '.version' module.json)
          echo "Current version: $CURRENT"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ github.event.inputs.release_type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW="$MAJOR.$MINOR.$PATCH"
          echo "New version: $NEW"
          echo "new_version=$NEW" >> "$GITHUB_OUTPUT"

      - name: Update module.json
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
          REPO: ${{ github.repository }}
        run: |
          DOWNLOAD="https://github.com/${REPO}/releases/download/v${NEW_VERSION}/module.zip"
          MANIFEST="https://github.com/${REPO}/releases/latest/download/module.json"
          jq --indent 4 \
            --arg v "$NEW_VERSION" \
            --arg dl "$DOWNLOAD" \
            --arg mf "$MANIFEST" \
            '.version = $v | .download = $dl | .manifest = $mf' \
            module.json > module.json.tmp
          mv module.json.tmp module.json
          cat module.json

      - name: Commit version bump
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          git add module.json
          git commit -m "Release v${NEW_VERSION}"
          git push origin "HEAD:${{ github.ref_name }}"

      - name: Create release archive
        run: |
          zip -r module.zip \
            module.json \
            scripts \
            styles \
            languages \
            README.md \
            LICENSE

      - name: Create tag
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          git tag "v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          gh release create "v${NEW_VERSION}" \
            module.json module.zip \
            --title "v${NEW_VERSION}" \
            --generate-notes \
            --latest
